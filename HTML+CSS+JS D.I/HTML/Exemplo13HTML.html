<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 13 - HTML</title>
</head>

<body>
    <form action="paginaDestino.aspx" method="get">
        <fieldset>
            <legend>Cadastro de Pessoa</legend>
            <div>
                <label for="">CPF</label><br>
                <input type="text" name="txtCPF" id="txtCPF">
            </div>
            <br>
            <div>
                <label for="">Nome</label><br>
                <input type="text" name="txtNome" id="txtNome">
            </div>
            <br>
            <div>
                <label for="">Data de Nascimento</label><br>
                <input type="date" name="txtDataNascimento" id="txtDataNascimento">
            </div>
            <br>
            <div>
                <label for="">Nome da Mãe</label><br>
                <input type="text" name="txtNomeMae" id="txtNomeMae">
            </div>
            <br>
            <button type="submit">Cadastrar</button>
        </fieldset>
    </form>
</body>

</html>
