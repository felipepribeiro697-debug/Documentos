<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Exemplo 15 - HTML</title>

<body>
    <form action="outroNome.php" method="post"></form>
    <fieldset>
        <legend>Dados Pessoais</legend>

        </div>
        <br>
        <div>

        <br>

            <label for="">Cidade</label>

        <br>
        <div>

            <select name="cboEstado" id="cboEstado">

            </select>

    </fieldset>
    <fieldset>
        <div>
            <label for="">Natureza do Cargo</label><br>
            <input type="radio" name="rdCargo" id="rdCargo" value="1">Gerência
            <input type="radio" name="rdCargo" id="rdCargo" value="2">Financeiro
            <input type="radio" name="rdCargo" id="rdCargo" value="3">Recepção
            <input type="radio" name="rdCargo" id="rdCargo" value="1">Administrativo
            <input type="radio" name="rdCargo" id="rdCargo" value="4">Jurídico

        <br>
        <div>
            <label for="">Área de Atuação</label><br>
            <input type="checkbox" name="chkAreaAtuacao" id="chkAreaAtuacao" value="1">Computação

            <input type="checkbox" name="chkAreaAtuacao" id="chkAreaAtuacao" value="3">Meio Ambiente
            <input type="checkbox" name="chkAreaAtuacao" id="chkAreaAtuacao" value="4">Engenharia
            <input type="checkbox" name="chkAreaAtuacao" id="chkAreaAtuacao" value="5">História
         </div>
         <br>

         <textarea name="txtCurriculo" id="txtCurriculo" rows="5" cols="45"></textarea>
    </fieldset>

</html>
